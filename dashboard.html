<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(90deg,#46a8b3,#1a1d1d);
    min-height:100vh;
    color:white;
}

h1{
    text-align:center;
    color:#39ff14;
    padding:20px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    margin-top:30px;
    flex-wrap:wrap;
}

/* TABLE CARD */

.card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

table{
    border-collapse:collapse;
    font-size:20px;
}

th,td{
    border:1px solid white;
    padding:15px;
    text-align:center;
}

th{
    background:#0d7377;
}

/* CAMERA CARD */

.camera{
    width:500px;
    height:350px;
    border:3px solid white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.camera img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.camera-title{
    text-align:center;
    margin-bottom:15px;
    color:#39ff14;
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

</style>
</head>

<body>

<h1>Security Monitoring Dashboard</h1>

<div class="container">

    <div class="card">
        <table>
            <tr>
                <th>ID</th>
                <th>Distance</th>
                <th>Status</th>
                <th>Time</th>
            </tr>

            <tr>
                <td id="id">--</td>
                <td id="distance">--</td>
                <td id="status">--</td>
                <td id="timestamp">--</td>
            </tr>
        </table>
    </div>
<div class="card">

    <h2 style="text-align:center; margin-bottom:15px; color:#39ff14;">
         ESP32-CAM Live Stream
    </h2>

    <div class="camera">
        <img src="http://192.168.137.9:81/stream" alt="ESP32-CAM Stream">
    </div>

</div>

</div>

<script>

function fetchData(){

    fetch('select.php')
    .then(response => response.json())
    .then(data => {

        document.getElementById('id').textContent = data.id;
        document.getElementById('distance').textContent = data.distance + " cm";
        document.getElementById('status').textContent = data.status;
        document.getElementById('timestamp').textContent = data.timestamp;

        // ====== COLOR LOGIC HERE ======
        let statusBox = document.getElementById('status');

        if(data.status === "DANGER"){
            statusBox.style.background = "red";
            statusBox.style.color = "white";
            statusBox.style.padding = "10px";
            statusBox.style.borderRadius = "10px";
            statusBox.style.fontWeight = "bold";
        }
        else if(data.status === "SAFE"){
            statusBox.style.background = "green";
            statusBox.style.color = "white";
            statusBox.style.padding = "10px";
            statusBox.style.borderRadius = "10px";
            statusBox.style.fontWeight = "bold";
        }
        else {
            statusBox.style.background = "gray";
        }

    })
    .catch(error => console.error(error));

}

fetchData();
setInterval(fetchData, 1000);
</script>

</body>
</html>
